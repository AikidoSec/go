name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: alpine-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    env:
      ALPINE_IMAGE: alpine:3.20
      BOOTSTRAP_GO_VERSION: 1.24.6
      GOOS: linux
      GOARCH: ${{ matrix.arch }}
      VERSION_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || format('devel-{0}', github.sha) }}
      VERSION_TIME: ${{ github.event.release.published_at || '' }}
      DISTPACK_DIR: ${{ github.workspace }}/pkg/distpack

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build release archives in Alpine
        run: |
          docker run --rm \
            --platform "linux/${GOARCH}" \
            -e BOOTSTRAP_GO_VERSION \
            -e GOARCH \
            -e GOOS \
            -e VERSION_NAME \
            -e VERSION_TIME \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${ALPINE_IMAGE}" \
            sh -euxc '
              apk add --no-cache bash build-base ca-certificates curl linux-headers

              if [ -z "$VERSION_TIME" ]; then
                VERSION_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              fi

              case "$GOARCH" in
                amd64) bootstrap_arch=amd64 ;;
                arm64) bootstrap_arch=arm64 ;;
                *)
                  echo "Unsupported GOARCH: $GOARCH" >&2
                  exit 1
                  ;;
              esac

              curl -fsSL "https://go.dev/dl/go${BOOTSTRAP_GO_VERSION}.linux-${bootstrap_arch}.tar.gz" -o /tmp/go-bootstrap.tgz
              tar -C /tmp -xzf /tmp/go-bootstrap.tgz

              printf "%s\n" "$VERSION_NAME" "time $VERSION_TIME" > /work/VERSION

              cd /work/src
              GOROOT_BOOTSTRAP=/tmp/go \
              GOROOT_FINAL=/usr/local/go \
              ./make.bash -distpack
            '

      - name: Collect binary archive
        id: collect
        run: |
          archive="$(find "$DISTPACK_DIR" -maxdepth 1 -type f -name "$VERSION_NAME.linux-$GOARCH.tar.gz" | head -n 1)"
          if [ -z "$archive" ]; then
            echo "Expected archive was not generated."
            ls -la "$DISTPACK_DIR"
            exit 1
          fi

          checksum="$archive.sha256"
          sha256sum "$archive" > "$checksum"

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION_NAME }}-alpine-linux-${{ matrix.arch }}
          path: |
            ${{ steps.collect.outputs.archive }}
            ${{ steps.collect.outputs.checksum }}
          if-no-files-found: error

      - name: Attach assets to GitHub release
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        env:
          ASSET_PATHS: |
            ${{ steps.collect.outputs.archive }}
            ${{ steps.collect.outputs.checksum }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseId = context.payload.release.id;
            const assets = process.env.ASSET_PATHS.split('\n').map(line => line.trim()).filter(Boolean);
            const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            for (const assetPath of assets) {
              const assetName = path.basename(assetPath);
              const existing = existingAssets.find(asset => asset.name === assetName);

              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.id,
                });
              }

              const assetData = fs.readFileSync(assetPath);
              const contentType = assetName.endsWith('.sha256') ? 'text/plain' : 'application/gzip';

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: assetName,
                data: assetData,
                headers: {
                  'content-length': assetData.length,
                  'content-type': contentType,
                },
              });
            }
